<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevEdge AI Chat Widget</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DEVEDGE DIGITAL — AI CHAT WIDGET
   Drop this entire file just before </body> on your site.
   Replace YOUR_ANTHROPIC_API_KEY below with your real key.
   Lead emails are sent to: hello@devedge.digital
   ============================================================ */

#de-chat-launcher {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 62px;
  height: 62px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FF6B2B 0%, #F59E0B 100%);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 0 0 rgba(255, 107, 43, 0.4);
  animation: dePulse 2.5s infinite;
  transition: transform 0.2s, box-shadow 0.2s;
  z-index: 99999;
}
#de-chat-launcher:hover {
  transform: scale(1.08);
  box-shadow: 0 8px 30px rgba(255, 107, 43, 0.5);
}
#de-chat-launcher .de-icon-chat,
#de-chat-launcher .de-icon-close {
  width: 26px;
  height: 26px;
  fill: #000;
  transition: opacity 0.2s, transform 0.2s;
  position: absolute;
}
#de-chat-launcher .de-icon-close { opacity: 0; transform: rotate(-90deg); }
#de-chat-launcher.de-open .de-icon-chat { opacity: 0; transform: rotate(90deg); }
#de-chat-launcher.de-open .de-icon-close { opacity: 1; transform: rotate(0deg); }

.de-notif-badge {
  position: absolute;
  top: -2px;
  right: -2px;
  width: 18px;
  height: 18px;
  background: #EF4444;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.52rem;
  font-weight: 700;
  color: #fff;
  border: 2px solid #060810;
}

@keyframes dePulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 43, 0.4); }
  50%       { box-shadow: 0 0 0 12px rgba(255, 107, 43, 0); }
}

/* CHAT WINDOW */
#de-chat-window {
  position: fixed;
  bottom: 104px;
  right: 28px;
  width: 390px;
  height: 580px;
  background: #0B0F1A;
  border: 1px solid rgba(255, 107, 43, 0.22);
  border-radius: 18px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.75), 0 0 60px rgba(255, 107, 43, 0.07);
  transform: scale(0.85) translateY(20px);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.22s ease;
  z-index: 99998;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
#de-chat-window.de-open {
  transform: scale(1) translateY(0);
  opacity: 1;
  pointer-events: auto;
}
@media (max-width: 480px) {
  #de-chat-window {
    right: 0; bottom: 0;
    width: 100vw; height: 100dvh;
    border-radius: 0;
  }
  #de-chat-launcher { bottom: 20px; right: 20px; }
}

/* HEADER */
.de-header {
  background: #131929;
  border-bottom: 1px solid rgba(255, 255, 255, 0.07);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
  flex-shrink: 0;
}
.de-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(135deg, #FF6B2B, #F59E0B);
  opacity: 0.45;
}
.de-bot-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FF6B2B, #F59E0B);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; font-weight: 800; color: #000;
  flex-shrink: 0; position: relative;
}
.de-status-dot {
  position: absolute; bottom: 1px; right: 1px;
  width: 9px; height: 9px;
  background: #22C55E; border-radius: 50%;
  border: 2px solid #131929;
}
.de-header-info { flex: 1; }
.de-header-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem; font-weight: 700; color: #CDD6F4;
}
.de-header-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.58rem; color: #22C55E; letter-spacing: 0.1em; margin-top: 2px;
}
.de-header-btns { display: flex; gap: 7px; }
.de-hbtn {
  background: none;
  border: 1px solid rgba(255, 255, 255, 0.07);
  color: #5A6A80; width: 28px; height: 28px;
  border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s, color 0.2s; font-size: 0.8rem;
  font-family: 'JetBrains Mono', monospace;
}
.de-hbtn:hover { border-color: rgba(255, 107, 43, 0.35); color: #FF6B2B; }

/* MESSAGES */
.de-messages {
  flex: 1; overflow-y: auto;
  padding: 16px 14px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
}
.de-messages::-webkit-scrollbar { width: 3px; }
.de-messages::-webkit-scrollbar-track { background: transparent; }
.de-messages::-webkit-scrollbar-thumb { background: rgba(255,107,43,0.2); border-radius: 3px; }

/* BUBBLES */
.de-msg {
  display: flex; gap: 8px; align-items: flex-end;
  animation: deMsgIn 0.28s ease;
}
@keyframes deMsgIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}
.de-msg.de-user { flex-direction: row-reverse; }
.de-msg-av {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; font-weight: 700;
}
.de-msg.de-bot .de-msg-av {
  background: linear-gradient(135deg, #FF6B2B, #F59E0B); color: #000;
}
.de-msg.de-user .de-msg-av {
  background: rgba(75,163,199,0.12);
  border: 1px solid rgba(75,163,199,0.25); color: #4BA3C7;
}
.de-bubble {
  max-width: 79%; padding: 10px 13px;
  border-radius: 14px; font-size: 0.875rem; line-height: 1.65; position: relative;
}
.de-msg.de-bot .de-bubble {
  background: #131929;
  border: 1px solid rgba(255,255,255,0.07);
  border-bottom-left-radius: 4px; color: #CDD6F4;
}
.de-msg.de-user .de-bubble {
  background: linear-gradient(135deg, rgba(255,107,43,0.16), rgba(245,158,11,0.1));
  border: 1px solid rgba(255,107,43,0.22);
  border-bottom-right-radius: 4px; color: #CDD6F4;
}
.de-msg-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.5rem; color: #5A6A80; margin-top: 4px;
}
.de-msg.de-user .de-msg-time { text-align: right; }

/* RICH TEXT */
.de-bubble strong { color: #FF6B2B; font-weight: 600; }
.de-bubble em     { color: #F59E0B; font-style: italic; }
.de-bubble code {
  font-family: 'JetBrains Mono', monospace; font-size: 0.77rem;
  background: rgba(255,107,43,0.08); border: 1px solid rgba(255,107,43,0.16);
  padding: 1px 5px; border-radius: 3px; color: #FF6B2B;
}
.de-bubble ul { margin: 6px 0 4px 16px; display: flex; flex-direction: column; gap: 3px; }
.de-bubble ul li { font-size: 0.85rem; color: rgba(205,214,244,0.85); }
.de-bubble ul li::marker { color: #FF6B2B; }

/* ROUTE CARD */
.de-route-card {
  background: rgba(255,107,43,0.05);
  border: 1px solid rgba(255,107,43,0.18);
  border-radius: 10px; padding: 10px 12px; margin-top: 8px;
}
.de-route-hdr {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem; color: #FF6B2B; letter-spacing: 0.1em; margin-bottom: 5px;
  display: flex; align-items: center; gap: 5px;
}
.de-route-name { font-size: 0.87rem; font-weight: 600; color: #CDD6F4; }
.de-route-role {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.58rem; color: #4BA3C7; margin-top: 2px;
}

/* LEAD FORM CARD */
.de-lead-card {
  background: #131929;
  border: 1px solid rgba(255,107,43,0.22);
  border-radius: 12px; padding: 14px; margin-top: 8px;
}
.de-lead-card h4 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; color: #FF6B2B;
  margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
}
.de-linput {
  width: 100%;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 6px; padding: 8px 10px;
  color: #CDD6F4; font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.82rem; outline: none;
  transition: border-color 0.2s; margin-bottom: 7px;
  box-sizing: border-box;
}
.de-linput:focus { border-color: rgba(255,107,43,0.38); }
.de-linput::placeholder { color: #5A6A80; }
.de-lbtn {
  width: 100%; padding: 9px;
  background: linear-gradient(135deg, #FF6B2B, #F59E0B);
  color: #000; font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em;
  border: none; border-radius: 6px; cursor: pointer;
  transition: opacity 0.2s;
}
.de-lbtn:hover { opacity: 0.85; }
.de-lbtn:disabled { opacity: 0.45; cursor: default; }

/* SUGGESTION CHIPS */
.de-chips {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 0 14px 10px; flex-shrink: 0;
}
.de-chip {
  font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
  padding: 5px 11px;
  background: #131929;
  border: 1px solid rgba(255,107,43,0.18);
  color: rgba(205,214,244,0.7);
  border-radius: 20px; cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.04em; white-space: nowrap;
}
.de-chip:hover { border-color: #FF6B2B; color: #FF6B2B; background: rgba(255,107,43,0.05); }

/* TYPING INDICATOR */
.de-typing {
  display: flex; align-items: center; gap: 4px;
  padding: 10px 13px;
  background: #131929;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px; border-bottom-left-radius: 4px;
  width: fit-content;
}
.de-typing span {
  width: 6px; height: 6px;
  background: #FF6B2B; border-radius: 50%;
  animation: deTyping 1.2s infinite;
}
.de-typing span:nth-child(2) { animation-delay: 0.2s; }
.de-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes deTyping {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30%            { transform: translateY(-5px); opacity: 1; }
}

/* INPUT AREA */
.de-input-area {
  border-top: 1px solid rgba(255,255,255,0.07);
  padding: 12px 14px;
  background: #131929;
  flex-shrink: 0;
}
.de-input-row { display: flex; gap: 8px; align-items: flex-end; }
.de-textarea {
  flex: 1;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px; padding: 9px 12px;
  color: #CDD6F4; font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.85rem; resize: none; outline: none;
  min-height: 38px; max-height: 100px; line-height: 1.5;
  transition: border-color 0.2s; overflow-y: auto;
}
.de-textarea:focus { border-color: rgba(255,107,43,0.32); }
.de-textarea::placeholder { color: #5A6A80; }
.de-send {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, #FF6B2B, #F59E0B);
  border: none; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.2s, transform 0.15s; flex-shrink: 0;
}
.de-send:hover { opacity: 0.85; transform: scale(1.05); }
.de-send:disabled { opacity: 0.38; cursor: default; transform: none; }
.de-send svg { width: 16px; height: 16px; fill: #000; }
.de-input-tools {
  display: flex; gap: 10px; margin-top: 8px; align-items: center;
}
.de-tool-btn {
  background: none; border: none; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; font-size: 0.58rem;
  color: #5A6A80; display: flex; align-items: center; gap: 4px;
  padding: 3px 6px; border-radius: 4px;
  transition: color 0.2s, background 0.2s;
}
.de-tool-btn:hover { color: #FF6B2B; background: rgba(255,107,43,0.05); }
.de-char { font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; color: #5A6A80; margin-left: auto; }

/* FOOTER */
.de-footer {
  text-align: center; padding: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.5rem;
  color: #5A6A80; letter-spacing: 0.08em;
  background: #0B0F1A; border-top: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}
.de-footer span { color: rgba(255,107,43,0.55); }
</style>
</head>
<body>

<!-- ============================================================
     DEVEDGE DIGITAL — AI CHAT WIDGET
     Paste from <div id="de-chat-launcher"> to the closing script
     tag just before </body> on your site.
     ============================================================ -->

<!-- LAUNCHER -->
<button id="de-chat-launcher" onclick="deToggleChat()" aria-label="Open DevBot chat">
  <div class="de-notif-badge" id="deNotifBadge">1</div>
  <svg class="de-icon-chat" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
  <svg class="de-icon-close" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
</button>

<!-- CHAT WINDOW -->
<div id="de-chat-window" role="dialog" aria-label="DevBot AI Chat">

  <!-- Header -->
  <div class="de-header">
    <div class="de-bot-avatar">DE<div class="de-status-dot"></div></div>
    <div class="de-header-info">
      <div class="de-header-name">&lt;DevBot /&gt;</div>
      <div class="de-header-sub">&#9679; Online · DevEdge Digital</div>
    </div>
    <div class="de-header-btns">
      <button class="de-hbtn" onclick="deClearChat()" title="Clear chat" aria-label="Clear chat">&#8635;</button>
      <button class="de-hbtn" onclick="deToggleChat()" title="Close" aria-label="Close chat">&#10005;</button>
    </div>
  </div>

  <!-- Messages -->
  <div class="de-messages" id="deMessages" aria-live="polite"></div>

  <!-- Suggestion Chips -->
  <div class="de-chips" id="deChips">
    <button class="de-chip" onclick="deSendChip(this)">&#128187; Web development</button>
    <button class="de-chip" onclick="deSendChip(this)">&#127912; Branding &amp; logo</button>
    <button class="de-chip" onclick="deSendChip(this)">&#128226; Digital marketing</button>
    <button class="de-chip" onclick="deSendChip(this)">&#128269; SEO services</button>
    <button class="de-chip" onclick="deSendChip(this)">&#128176; Pricing &amp; timeline</button>
    <button class="de-chip" onclick="deSendChip(this)">&#128222; Talk to the team</button>
  </div>

  <!-- Input -->
  <div class="de-input-area">
    <div class="de-input-row">
      <textarea
        class="de-textarea"
        id="deInput"
        placeholder="Ask about our services..."
        rows="1"
        maxlength="500"
        onkeydown="deHandleKey(event)"
        oninput="deCharCount(this)"
        aria-label="Type your message"
      ></textarea>
      <button class="de-send" id="deSendBtn" onclick="deSendMessage()" aria-label="Send message">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="de-input-tools">
      <button class="de-tool-btn" onclick="deShowLeadCapture()">&#128203; Start a project</button>
      <button class="de-tool-btn" onclick="deOpenEmail()">&#128140; Email us directly</button>
      <span class="de-char" id="deChar">0 / 500</span>
    </div>
  </div>

  <div class="de-footer">Powered by <span>Claude AI</span> &nbsp;·&nbsp; DevEdge Digital &copy; 2026</div>
</div>

<script>
(function () {
  // ============================================================
  //  CONFIG — replace with your real Anthropic API key
  // ============================================================
  var API_KEY   = 'YOUR_ANTHROPIC_API_KEY';
  var API_URL   = 'https://api.anthropic.com/v1/messages';
  var LEAD_EMAIL = 'hello@devedge.digital';

  // ============================================================
  //  SYSTEM PROMPT
  // ============================================================
  var SYSTEM = `You are DevBot, the AI assistant for DevEdge Digital — a high-performance web development and digital creative studio based in Davao, Philippines, working globally (US, Australia, Middle East, and beyond).

Services:
1. Web Design & Development — WordPress, React, Next.js. Fast, responsive, conversion-optimised. 2–6 week timelines.
2. Branding & Identity Design — Logos, brand guidelines, visual assets, print collateral.
3. Digital Marketing — Social media, PPC, paid-ads strategy.
4. SEO Optimisation — On-page, technical, local SEO.
5. Video Marketing & Editing — Motion graphics, social video, brand storytelling.

Studio facts:
- 11 years in business (since 2014)
- 200+ projects completed, 200+ brands supported
- $2M+ ad spend managed, 150+ landing pages built
- Response time: within 24 hours
- Email: hello@devedge.digital

Team & routing:
- Web development → Jericho M. (Full-Stack Developer) or Enald A. (Founder & Lead Developer)
- Branding / graphic design → Jade M. (Senior Graphic Designer & Video Editor)
- Video editing / motion → Jade M., Rozendo DR., or Alexis R.
- Digital marketing / SEO / paid ads → Ian I. (Digital Marketing Strategist)
- Project management / general inquiries / operations → Judy N. (Operations Manager)
- Multi-service / complex projects → Enald A. (Founder)

Personality: Friendly, professional, slightly techy. Use occasional code-style formatting. Keep responses concise (2–4 short paragraphs). Use bullet points for lists. Bold key terms.

CRITICAL RULES — follow these exactly:
1. NEVER ask for the user's name, email, or any personal details in the chat. NEVER say "share your name", "what's your email", "just share your name", or anything similar.
2. When a user wants to get started, book a call, get a quote, inquire, or contact the team — respond with a SHORT message (1–2 sentences max) then end with exactly this token on its own line: [SHOW_LEAD_FORM]
3. The [SHOW_LEAD_FORM] token automatically triggers a contact form inside the chat — do NOT explain it or ask for info yourself.
4. For scheduling/discovery calls: mention briefly that the team will confirm timing after reviewing the inquiry, then use [SHOW_LEAD_FORM].
5. Only use [SHOW_LEAD_FORM] when the user clearly wants to take action — not for general questions.`;

  // ============================================================
  //  STATE
  // ============================================================
  var history  = [];
  var busy     = false;
  var isOpen   = false;
  var chipsHidden = false;

  // ============================================================
  //  TOGGLE
  // ============================================================
  window.deToggleChat = function () {
    isOpen = !isOpen;
    var win  = document.getElementById('de-chat-window');
    var btn  = document.getElementById('de-chat-launcher');
    var bdg  = document.getElementById('deNotifBadge');
    win.classList.toggle('de-open', isOpen);
    btn.classList.toggle('de-open', isOpen);
    if (isOpen) {
      if (bdg) bdg.style.display = 'none';
      if (history.length === 0) deInitWelcome();
      setTimeout(function () {
        var inp = document.getElementById('deInput');
        if (inp) inp.focus();
      }, 320);
    }
  };

  // ============================================================
  //  WELCOME MESSAGE
  // ============================================================
  function deInitWelcome() {
    deBotMsg(
      'Hey there! \uD83D\uDC4B I\'m **DevBot**, your guide to everything **DevEdge Digital**.\n\n' +
      'We\'re a full-service digital studio — web dev, branding, marketing, SEO, and video. **11 years** of craft, **200+ projects** delivered globally.\n\n' +
      'What can I help you with today? Pick a topic below or just type away!',
      nowTime()
    );
  }

  // ============================================================
  //  SEND USER MESSAGE
  // ============================================================
  window.deSendMessage = function () {
    var inp  = document.getElementById('deInput');
    var text = inp.value.trim();
    if (!text || busy) return;

    var t = nowTime();
    inp.value = '';
    deCharCount(inp);
    inp.style.height = 'auto';

    history.push({ role: 'user', content: text });
    deUserMsg(text, t);
    deHideChips();

    busy = true;
    document.getElementById('deSendBtn').disabled = true;
    deShowTyping();

    fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      deRemoveTyping();
      var reply = (data.content && data.content.find(function (b) { return b.type === 'text'; })) 
                    ? data.content.find(function (b) { return b.type === 'text'; }).text
                    : 'Oops — something went wrong. Email us at **hello@devedge.digital** and we\'ll get right back to you!';
      history.push({ role: 'assistant', content: reply });

      // Check if Claude wants us to show the lead form
      var showForm = reply.indexOf('[SHOW_LEAD_FORM]') !== -1;
      var cleanReply = reply.replace(/\[SHOW_LEAD_FORM\]/g, '').trim();

      var extra = deDetectRoute(text + ' ' + reply);
      if (cleanReply) deBotMsg(cleanReply, nowTime(), extra);
      if (showForm) setTimeout(deShowLeadCapture, 400);
    })
    .catch(function () {
      deRemoveTyping();
      deBotMsg('Connection issue — please email us at **hello@devedge.digital** and we\'ll be in touch within 24 hours!', nowTime());
    })
    .finally(function () {
      busy = false;
      document.getElementById('deSendBtn').disabled = false;
      var inp2 = document.getElementById('deInput');
      if (inp2) inp2.focus();
    });
  };

  // ============================================================
  //  KEYBOARD HANDLER
  // ============================================================
  window.deHandleKey = function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      deSendMessage();
    }
    var ta = e.target;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
  };

  // ============================================================
  //  CHAR COUNT
  // ============================================================
  window.deCharCount = function (ta) {
    var el = document.getElementById('deChar');
    if (el) el.textContent = ta.value.length + ' / 500';
  };

  // ============================================================
  //  SUGGESTION CHIPS
  // ============================================================
  window.deSendChip = function (btn) {
    var raw  = btn.textContent.trim();
    // Strip leading emoji + space
    var text = raw.replace(/^[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\s]+/u, '').trim();
    document.getElementById('deInput').value = 'Tell me about your ' + text + ' services';
    deSendMessage();
  };

  function deHideChips() {
    if (chipsHidden) return;
    chipsHidden = true;
    var c = document.getElementById('deChips');
    if (c) c.style.display = 'none';
  }

  // ============================================================
  //  LEAD CAPTURE FORM (rendered as a bot message)
  // ============================================================
  window.deShowLeadCapture = function () {
    deHideChips();
    var msgs = document.getElementById('deMessages');
    var div  = document.createElement('div');
    div.className = 'de-msg de-bot';
    div.innerHTML =
      '<div class="de-msg-av">DE</div>' +
      '<div>' +
        '<div class="de-bubble">Let\'s get your project rolling! Fill in your details and I\'ll forward them to the right specialist.' +
          '<div class="de-lead-card">' +
            '<h4>&#128203; // start_project()</h4>' +
            '<input class="de-linput" type="text"  id="deLeadName"    placeholder="Your name" />' +
            '<input class="de-linput" type="email" id="deLeadEmail"   placeholder="Email address" />' +
            '<input class="de-linput" type="text"  id="deLeadCompany" placeholder="Company / brand (optional)" />' +
            '<select class="de-linput" id="deLeadService" style="cursor:pointer;">' +
              '<option value="" disabled selected>Service needed...</option>' +
              '<option>Web Design &amp; Development</option>' +
              '<option>Branding &amp; Identity Design</option>' +
              '<option>Digital Marketing</option>' +
              '<option>SEO Optimisation</option>' +
              '<option>Video Marketing &amp; Editing</option>' +
              '<option>Full Package (Multiple Services)</option>' +
              '<option>Other / Not Sure Yet</option>' +
            '</select>' +
            '<textarea class="de-linput" id="deLeadMsg" rows="2" placeholder="Brief project description..."></textarea>' +
            '<button class="de-lbtn" id="deLeadSubmitBtn" onclick="deSubmitLead()">$ submit_inquiry &#8594;</button>' +
          '</div>' +
        '</div>' +
        '<div class="de-msg-time">' + nowTime() + '</div>' +
      '</div>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  };

  window.deSubmitLead = function () {
    var name    = (document.getElementById('deLeadName')    || {}).value || '';
    var email   = (document.getElementById('deLeadEmail')   || {}).value || '';
    var company = (document.getElementById('deLeadCompany') || {}).value || '';
    var service = (document.getElementById('deLeadService') || {}).value || '';
    var message = (document.getElementById('deLeadMsg')     || {}).value || '';

    name    = name.trim();
    email   = email.trim();
    service = service.trim();

    if (!name || !email || !service) {
      alert('Please fill in your name, email, and the service you need!');
      return;
    }

    var btn = document.getElementById('deLeadSubmitBtn');
    if (btn) { btn.textContent = '$ sending...'; btn.disabled = true; }

    // ── Send via Web3Forms — free, no account needed for basic use ──────
    // Uses your email directly. No Formspree account required.
    // Get a free access key at https://web3forms.com (takes 30 seconds)
    // Then replace WEB3FORMS_ACCESS_KEY below with your key.
    // ─────────────────────────────────────────────────────────────────────
    var WEB3FORMS_KEY = 'WEB3FORMS_ACCESS_KEY'; // <-- replace this

    var payload = {
      access_key:  WEB3FORMS_KEY,
      from_name:   'DevBot — DevEdge Digital',
      subject:     '\uD83E\uDD16 DevBot Lead: ' + service + ' \u2014 ' + name,
      to_email:    LEAD_EMAIL,
      replyto:     email,
      name:        name,
      email:       email,
      company:     company || '\u2014',
      service:     service,
      message:     message || '\u2014',
      source:      'DevBot AI Chat Widget',
      botcheck:    ''
    };

    fetch('https://api.web3forms.com/submit', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body:    JSON.stringify(payload)
    })
    .then(function (data) {
      if (data.success) {
        if (btn) { btn.textContent = '$ sent \u2713'; btn.style.opacity = '0.6'; }
        history.push({ role: 'user', content: 'I want to start a project. Name: ' + name + ', Email: ' + email + ', Service: ' + service + (message ? ', Details: ' + message : '') });
        var extra = deDetectRoute(service);
        deBotMsg(
          '\u2705 Got it, **' + name + '**! Your inquiry has been sent to **' + LEAD_EMAIL + '**.\n\n' +
          'Expect a reply within **24 hours**. We\'re routing you to the right specialist for **' + service + '**.\n\n' +
          'Anything else I can help with?',
          nowTime(),
          extra
        );
      } else {
        if (btn) { btn.textContent = '$ try again'; btn.disabled = false; }
        deBotMsg('Hmm, the form had a hiccup. Email us directly at **hello@devedge.digital** and we\'ll respond promptly!', nowTime());
      }
    })
    .catch(function () {
      if (btn) { btn.textContent = '$ try again'; btn.disabled = false; }
      deBotMsg('Network error. Please email **hello@devedge.digital** directly — we reply within 24 hours!', nowTime());
    });
  };

  // ============================================================
  //  EMAIL DIRECT LINK
  // ============================================================
  window.deOpenEmail = function () {
    window.location.href = 'mailto:' + LEAD_EMAIL + '?subject=Project%20Inquiry%20%E2%80%94%20DevEdge%20Digital';
  };

  // ============================================================
  //  ROUTING DETECTION
  // ============================================================
  function deDetectRoute(text) {
    var t = text.toLowerCase();
    var p = null;

    if (/(web|wordpress|develop|site|landing page|react|next\.js)/.test(t)) {
      p = { name: 'Jericho M. / Enald A.', role: 'Web Development Team', icon: '\uD83D\uDCBB' };
    } else if (/(brand|logo|identity|visual|graphic|design)/.test(t)) {
      p = { name: 'Jade M.', role: 'Senior Graphic Designer', icon: '\uD83C\uDFA8' };
    } else if (/(video|editing|motion|reel|youtube|tiktok)/.test(t)) {
      p = { name: 'Jade M. / Rozendo DR. / Alexis R.', role: 'Video Production Team', icon: '\uD83C\uDFAC' };
    } else if (/(seo|search|rank|keyword|google)/.test(t)) {
      p = { name: 'Ian I.', role: 'SEO Specialist', icon: '\uD83D\uDD0D' };
    } else if (/(marketing|ads|ppc|social|paid|campaign|tiktok shop|amazon)/.test(t)) {
      p = { name: 'Ian I.', role: 'Digital Marketing Strategist', icon: '\uD83D\uDCE3' };
    } else if (/(start|project|quote|price|cost|hire|budget|timeline|package|full)/.test(t)) {
      p = { name: 'Judy N.', role: 'Operations Manager', icon: '\uD83D\uDCCB' };
    }

    if (!p) return '';

    return '<div class="de-route-card">' +
             '<div class="de-route-hdr">\uD83D\uDD00 ROUTING TO SPECIALIST</div>' +
             '<div class="de-route-name">' + p.icon + ' ' + p.name + '</div>' +
             '<div class="de-route-role">' + p.role + '</div>' +
           '</div>';
  }

  // ============================================================
  //  CLEAR CHAT
  // ============================================================
  window.deClearChat = function () {
    history = [];
    chipsHidden = false;
    document.getElementById('deMessages').innerHTML = '';
    var c = document.getElementById('deChips');
    if (c) c.style.display = 'flex';
    deInitWelcome();
  };

  // ============================================================
  //  DOM HELPERS
  // ============================================================
  function deBotMsg(text, time, extra) {
    var msgs = document.getElementById('deMessages');
    var div  = document.createElement('div');
    div.className = 'de-msg de-bot';
    div.innerHTML =
      '<div class="de-msg-av">DE</div>' +
      '<div>' +
        '<div class="de-bubble">' + deParseRich(text) + (extra || '') + '</div>' +
        '<div class="de-msg-time">' + time + '</div>' +
      '</div>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function deUserMsg(text, time) {
    var msgs = document.getElementById('deMessages');
    var div  = document.createElement('div');
    div.className = 'de-msg de-user';
    div.innerHTML =
      '<div class="de-msg-av">YOU</div>' +
      '<div>' +
        '<div class="de-bubble">' + deEscape(text) + '</div>' +
        '<div class="de-msg-time">' + time + '</div>' +
      '</div>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function deShowTyping() {
    var msgs = document.getElementById('deMessages');
    var div  = document.createElement('div');
    div.className = 'de-msg de-bot';
    div.id = 'deTyping';
    div.innerHTML = '<div class="de-msg-av">DE</div><div class="de-typing"><span></span><span></span><span></span></div>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function deRemoveTyping() {
    var t = document.getElementById('deTyping');
    if (t) t.remove();
  }

  function deParseRich(t) {
    return t
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,    '<em>$1</em>')
      .replace(/`(.*?)`/g,      '<code>$1</code>')
      .replace(/^- (.+)$/gm,    '<li>$1</li>')
      .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
      .replace(/\n\n/g, '</p><p style="margin-top:6px;">')
      .replace(/\n/g,  '<br>');
  }

  function deEscape(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function nowTime() {
    return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  // ============================================================
  //  AUTO-OPEN with a slight delay on page load
  // ============================================================
  setTimeout(function () {
    var bdg = document.getElementById('deNotifBadge');
    if (bdg) bdg.style.display = 'flex'; // ensure badge shows on load
  }, 3000);

  // Optional: auto-open when user reaches the contact section
  (function () {
    var contact = document.getElementById('contact');
    if (!contact || !('IntersectionObserver' in window)) return;
    var triggered = false;
    new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting && !triggered && !isOpen) {
          triggered = true;
          deToggleChat();
        }
      });
    }, { threshold: 0.4 }).observe(contact);
  })();

})();
</script>

</body>
</html>
